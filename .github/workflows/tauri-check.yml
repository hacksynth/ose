name: Tauri Check

on:
  pull_request:
    branches: [main]
    paths:
      - package*.json
      - next.config.mjs
      - src-tauri/**
      - scripts/prepare-sidecar.js
      - .github/workflows/tauri-check.yml
  push:
    branches: [main, master]
    paths:
      - package*.json
      - next.config.mjs
      - src-tauri/**
      - scripts/prepare-sidecar.js
      - .github/workflows/tauri-check.yml
  merge_group:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  DATABASE_URL: file:./src/prisma/dev.db
  NEXTAUTH_URL: http://localhost:3000
  NEXTAUTH_SECRET: tauri-ci-secret
  AUTH_URL: http://localhost:3000
  AUTH_SECRET: tauri-ci-secret
  NEXT_TELEMETRY_DISABLED: 1

concurrency:
  group: tauri-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - run: npm ci
      - run: npm run tauri:icons
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      - run: npm run tauri:prepare
      - run: cargo check --manifest-path src-tauri/Cargo.toml --all-targets

      - name: Clippy advisory
        continue-on-error: true
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

name: Android APK

on:
  pull_request:
    branches: [main]
    paths:
      - package*.json
      - next.config.mjs
      - public/**
      - data/51cto-seed.json
      - src/**
      - src-tauri/**
      - scripts/**
      - .github/workflows/android-apk.yml
  push:
    branches: [main, master]
    paths:
      - package*.json
      - next.config.mjs
      - public/**
      - data/51cto-seed.json
      - src/**
      - src-tauri/**
      - scripts/**
      - .github/workflows/android-apk.yml
  workflow_dispatch:

permissions:
  contents: read

env:
  DATABASE_URL: file:./ci-android.db
  NEXTAUTH_URL: http://localhost:3000
  NEXTAUTH_SECRET: android-ci-secret
  AUTH_URL: http://localhost:3000
  AUTH_SECRET: android-ci-secret
  NEXT_PUBLIC_EXAM_DATE: 2026-05-23
  ANDROID_NDK_VERSION: 27.0.12077973
  ANDROID_BUILD_TOOLS_VERSION: 35.0.0
  OSE_MOBILE_URL: ${{ vars.OSE_MOBILE_URL || secrets.OSE_MOBILE_URL }}

concurrency:
  group: android-apk-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Android NDK
        shell: bash
        run: |
          set -euxo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --install "platform-tools" "build-tools;${ANDROID_BUILD_TOOLS_VERSION}" "ndk;${ANDROID_NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
          echo "NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Generate Tauri icons
        run: npm run tauri:icons

      - name: Initialize Android project
        shell: bash
        run: |
          set -euxo pipefail
          if [ ! -d src-tauri/gen/android ]; then
            npm run tauri:android:init
          fi

      - name: Build APK
        run: npm run tauri:android:build:apk

      - name: Sign and collect APK artifacts
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_TYPE: ${{ secrets.ANDROID_KEYSTORE_TYPE }}
        shell: bash
        run: bash scripts/sign-android-apks.sh src-tauri/gen/android android-apk OSE-Android-signed

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: android-apk/*.apk
          if-no-files-found: error

name: Android APK

on:
  pull_request:
    branches: [main]
    paths:
      - package*.json
      - next.config.mjs
      - src/**
      - src-tauri/**
      - scripts/**
      - .github/workflows/android-apk.yml
  push:
    branches: [main, master]
    paths:
      - package*.json
      - next.config.mjs
      - src/**
      - src-tauri/**
      - scripts/**
      - .github/workflows/android-apk.yml
  workflow_dispatch:

permissions:
  contents: read

env:
  DATABASE_URL: file:./ci-android.db
  NEXTAUTH_URL: http://localhost:3000
  NEXTAUTH_SECRET: android-ci-secret
  AUTH_URL: http://localhost:3000
  AUTH_SECRET: android-ci-secret
  NEXT_PUBLIC_EXAM_DATE: 2026-05-23
  ANDROID_NDK_VERSION: 27.0.12077973

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Android NDK
        shell: bash
        run: |
          set -euxo pipefail
          yes | sdkmanager --licenses >/dev/null
          sdkmanager --install "ndk;${ANDROID_NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
          echo "NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Generate Tauri icons
        run: npm run tauri:icons

      - name: Initialize Android project
        shell: bash
        run: |
          set -euxo pipefail
          if [ ! -d src-tauri/gen/android ]; then
            npm run tauri:android:init
          fi

      - name: Build APK
        run: npm run tauri:android:build:apk

      - name: Collect APK artifacts
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p android-apk
          find src-tauri/gen/android -type f -name "*.apk" -print -exec cp {} android-apk/ \;
          test -n "$(find android-apk -type f -name '*.apk' -print -quit)"
          ls -la android-apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android-apk/*.apk
          if-no-files-found: error

name: Desktop CD

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DATABASE_URL: file:./ci-desktop.db
  AUTH_SECRET: ci-desktop-secret-change-me
  AUTH_URL: http://localhost:3000
  NEXTAUTH_URL: http://localhost:3000
  NEXT_PUBLIC_EXAM_DATE: 2026-05-23

jobs:
  desktop:
    name: Build desktop (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            artifact-name: ose-windows
          - platform: macos-latest
            artifact-name: ose-macos
          - platform: ubuntu-22.04
            artifact-name: ose-linux
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Generate Tauri icons
        run: npm run tauri:icons

      - name: Build Tauri app
        run: npm run tauri:build

      - name: Create Windows portable zip
        if: matrix.platform == 'windows-latest'
        shell: powershell
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $sourceDir = "src-tauri/target/release"
          $portableRoot = "$sourceDir/portable/OSE_${version}_windows_x64_portable"
          $zipPath = "$sourceDir/bundle/portable/OSE_${version}_windows_x64_portable.zip"
          New-Item -ItemType Directory -Force $portableRoot | Out-Null
          New-Item -ItemType Directory -Force (Split-Path $zipPath) | Out-Null
          Copy-Item "$sourceDir/ose.exe" "$portableRoot/OSE.exe" -Force
          if (Test-Path "$sourceDir/resources") {
            Copy-Item "$sourceDir/resources" "$portableRoot/resources" -Recurse -Force
          }
          $standaloneSource = "src-tauri/binaries/standalone"
          $standaloneTarget = "$portableRoot/resources/binaries/standalone"
          if (!(Test-Path "$standaloneSource/start.js")) {
            throw "Next.js standalone sidecar not found at $standaloneSource"
          }
          New-Item -ItemType Directory -Force (Split-Path $standaloneTarget) | Out-Null
          Copy-Item $standaloneSource $standaloneTarget -Recurse -Force
          @"
          OSE Windows Portable

          1. Keep OSE.exe and the resources directory together.
          2. Node.js 20+ must be installed and available in PATH.
          3. User data is stored in the system app data directory.
          "@ | Set-Content -Encoding UTF8 "$portableRoot/README.txt"
          Compress-Archive -Path "$portableRoot/*" -DestinationPath $zipPath -Force

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/portable/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: desktop
    runs-on: ubuntu-latest

    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -maxdepth 2 -type f -print

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release-assets/**/*
